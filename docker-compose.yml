services:
  postgres:
    image: postgres:16-alpine
    container_name: autohub-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: autohub
      POSTGRES_PASSWORD: autohub_dev
      POSTGRES_DB: autohub_bd
    volumes:
      - autohub_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autohub -d autohub_bd"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: autohub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - autohub_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  autohub_pg_data:
  autohub_redis_data:
