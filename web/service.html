<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="js/theme.js"></script>
  <title>Book a Service | AutoHub BD</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <main>
    <div class="container">
      <div class="page-header">
        <h1>Book a Service</h1>
        <p>Choose your service type, preferred date &amp; time, and nearest service center.</p>
      </div>

      <div class="form-card" style="max-width:560px;margin:0 auto 3rem">
        <div id="bookAlert"></div>
        <form id="bookForm">
          <div class="form-group">
            <label for="serviceCenter">Service Center</label>
            <select id="serviceCenter" class="form-input" required>
              <option value="">Select a center…</option>
            </select>
          </div>
          <div class="form-group">
            <label for="serviceType">Service Type</label>
            <select id="serviceType" class="form-input" required>
              <option value="">Select service…</option>
              <option value="CHECKUP">General Checkup</option>
              <option value="OIL_CHANGE">Oil Change</option>
              <option value="REPAIR">Repair</option>
              <option value="PART_INSTALLATION">Part Installation</option>
              <option value="TIRE_SERVICE">Tire Service</option>
              <option value="AC_SERVICE">AC Service</option>
              <option value="BODY_WORK">Body Work</option>
            </select>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
            <div class="form-group">
              <label for="carBrand">Car Brand</label>
              <input type="text" id="carBrand" class="form-input" required placeholder="Toyota" />
            </div>
            <div class="form-group">
              <label for="carModel">Car Model</label>
              <input type="text" id="carModel" class="form-input" required placeholder="Corolla" />
            </div>
          </div>
          <div class="form-group">
            <label for="carYear">Year (optional)</label>
            <input type="number" id="carYear" class="form-input" min="1990" max="2030" placeholder="2020" />
          </div>
          <div class="form-group">
            <label for="issueDescription">Issue / Notes (optional)</label>
            <textarea id="issueDescription" class="form-input" rows="3" placeholder="Describe the issue…"></textarea>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
            <div class="form-group">
              <label for="preferredDate">Preferred Date</label>
              <input type="date" id="preferredDate" class="form-input" required />
            </div>
            <div class="form-group">
              <label for="preferredTime">Time Slot</label>
              <select id="preferredTime" class="form-input" required disabled>
                <option value="">Pick date first…</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="contactName">Your Name</label>
            <input type="text" id="contactName" class="form-input" required />
          </div>
          <div class="form-group">
            <label for="contactPhone">Phone</label>
            <input type="tel" id="contactPhone" class="form-input" required placeholder="01712345678" />
          </div>
          <div class="form-group">
            <label for="contactEmail">Email (optional)</label>
            <input type="email" id="contactEmail" class="form-input" placeholder="you@email.com" />
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%">Book Appointment</button>
        </form>
      </div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="js/env.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/pages/service-booking.js"></script>
</body>
</html>
