<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="js/theme.js"></script>
  <title>Parts &amp; Accessories | AutoHub BD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <main>
    <div class="container">
      <div class="page-header">
        <h1>Parts &amp; Accessories</h1>
        <p>Engine, brakes, suspension, electronics, and more — filter by compatibility.</p>
      </div>

      <div class="filters">
        <select class="filter-select" id="categoryFilter">
          <option value="">All Categories</option>
          <option value="engine">Engine</option>
          <option value="brakes">Brakes</option>
          <option value="suspension">Suspension</option>
          <option value="electronics">Electronics</option>
          <option value="interior">Interior</option>
          <option value="exterior">Exterior</option>
          <option value="wheels-tires">Wheels &amp; Tires</option>
          <option value="lubricants">Lubricants</option>
        </select>
        <input type="search" class="filter-input" id="searchInput" placeholder="Search parts or part number…" />
        <button class="btn btn-primary" id="searchBtn">Search</button>
      </div>

      <p class="results-count" id="resultsCount"></p>
      <div class="grid-4" id="productsGrid">
        <div class="loading"><div class="spinner"></div>Loading parts…</div>
      </div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="js/env.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/pages/parts.js"></script>
</body>
</html>
